<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, minimum-scale=1.0" />
    <meta name="theme-color" content="#0D1117" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>WEVOX Auto</title>
    <!-- Шрифты загружаем асинхронно, чтобы не блокировать первый экран на телефоне -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" /></noscript>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Сразу убираем индикатор загрузки Telegram (4 квадрата), показываем свой экран «Загрузка…»
      if (window.Telegram && window.Telegram.WebApp) {
        var tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        if (tg.enableClosingConfirmation) tg.enableClosingConfirmation(false);
        if (tg.isVersionAtLeast && tg.isVersionAtLeast('6.7') && tg.setViewportStableHeight) tg.setViewportStableHeight(true);
        if (tg.setHeaderColor) tg.setHeaderColor('#0D1117');
        if (tg.setBackgroundColor) tg.setBackgroundColor('#0D1117');
        var colorScheme = tg.colorScheme || 'dark';
        if (colorScheme === 'dark') document.documentElement.classList.add('dark');
      }
    </script>
  </head>
  <body>
    <div id="root">
      <div id="loading-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;background:linear-gradient(180deg,#0B0F19 0%,#060A13 100%);color:#94A3B8;font-family:system-ui,sans-serif;padding:20px;text-align:center;">
        <span>Загрузка…</span>
        <button id="reload-btn" type="button" style="display:none;margin-top:16px;padding:12px 24px;background:#00E676;color:#000;border:none;border-radius:12px;font-weight:600;font-size:14px;cursor:pointer;">Обновить страницу</button>
      </div>
    </div>
    <script>
      var reloadBtn = document.getElementById('reload-btn');
      if (reloadBtn) reloadBtn.addEventListener('click', function(){ window.location.reload(); });
      function showReload(msg) {
        var btn = document.getElementById('reload-btn');
        var span = document.querySelector('#loading-screen span');
        if (span) span.textContent = msg || 'Не удалось загрузить приложение.';
        if (btn) btn.style.display = 'block';
      }
      setTimeout(function(){
        if (!window.__APP_LOADED__) showReload('Не удалось загрузить приложение. Проверьте интернет и нажмите «Обновить».');
      }, 8000);
      setTimeout(function(){
        if (!window.__APP_LOADED__) showReload('Долго загружается? Нажмите «Обновить страницу».');
      }, 10000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
