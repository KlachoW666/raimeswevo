<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFC2"/>
      <stop offset="100%" style="stop-color:#00D9A6"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFC2"/>
      <stop offset="100%" style="stop-color:#00B88C"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E8B0"/>
      <stop offset="100%" style="stop-color:#00FFC2"/>
    </linearGradient>
  </defs>

  <!-- Dark background with rounded corners -->
  <rect width="512" height="512" rx="102" fill="#0C0F16"/>

  <!-- 
    Abstract Z mark — two arrow/chevron shapes interlocking
    Inspired by: Bitget's angular icon, MEXC's line-based M, Binance's diamond
    Creates a dynamic "Z" flow from two mirrored chevrons
  -->
  
  <!-- Top chevron pointing right -->
  <path d="
    M 120,144
    L 280,144
    L 392,256
    L 280,256
    Z
  " fill="url(#grad1)"/>
  
  <!-- Bottom chevron pointing left -->
  <path d="
    M 392,368
    L 232,368
    L 120,256
    L 232,256
    Z
  " fill="url(#grad2)"/>

  <!-- Center diamond connector — the intersection accent -->
  <path d="
    M 256,216
    L 296,256
    L 256,296
    L 216,256
    Z
  " fill="#0C0F16"/>
  
  <!-- Inner diamond highlight -->
  <path d="
    M 256,228
    L 284,256
    L 256,284
    L 228,256
    Z
  " fill="url(#grad3)" opacity="0.9"/>

</svg>
